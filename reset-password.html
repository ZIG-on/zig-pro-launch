<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — ZIG-on</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#D4A017;--gold-lt:#F0C040;--gold-dim:rgba(212,160,23,.12);--bg:#060606;--bg-2:#0D0D0D;--bg-3:#141414;--border:rgba(255,255,255,.06);--border-g:rgba(212,160,23,.22);--text:#F0EDE8;--text-2:#A09890;--text-3:#5A5450;--grad:linear-gradient(135deg,#D4A017 0%,#F0C040 50%,#D4A017 100%);--success:#10B981;--error:#EF4444;--radius:12px}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:1}
        body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,160,23,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(212,160,23,.025) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0}
        .glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(ellipse at center,rgba(212,160,23,.07) 0%,transparent 65%);pointer-events:none;z-index:0}
        .card{width:100%;max-width:420px;position:relative;z-index:2}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;text-decoration:none;color:var(--text)}
        .logo .bar{width:4px;height:32px;background:var(--grad);border-radius:2px}
        .card-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;text-align:center;margin-bottom:8px}
        .card-sub{font-size:14px;color:var(--text-2);text-align:center;margin-bottom:28px}
        .form-wrap{background:var(--bg-2);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:16px}
        .form-group{display:flex;flex-direction:column;gap:6px}
        .form-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3)}
        .input-wrap{position:relative}
        .form-input{width:100%;padding:12px 42px 12px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
        .form-input::placeholder{color:var(--text-3)}.form-input:focus{border-color:var(--border-g)}
        .input-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-3);cursor:pointer;user-select:none}
        .pw-strength{display:flex;gap:4px}
        .pw-bar{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s}
        .pw-bar.weak{background:var(--error)}.pw-bar.fair{background:#f59e0b}.pw-bar.strong{background:var(--success)}
        .alert{padding:12px 16px;border-radius:9px;font-size:13px;line-height:1.5;display:none;align-items:center;gap:8px}
        .alert.show{display:flex}
        .alert.success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--success)}
        .alert.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--error)}
        .btn-primary{width:100%;padding:14px;background:var(--grad);border:none;border-radius:var(--radius);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:all .25s}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,160,23,.3)}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .field-err{font-size:11px;color:var(--error)}
        .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .invalid-msg{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
        .invalid-icon{font-size:52px;opacity:.4}
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <a href="index.html" class="logo"><div class="bar"></div>ZIG</a>

        <!-- Invalid token view -->
        <div class="invalid-msg" id="invalidMsg" style="display:none">
            <div class="invalid-icon">🔒</div>
            <h2 style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px">Lien expiré</h2>
            <p style="font-size:14px;color:var(--text-2);line-height:1.6;max-width:300px">Ce lien de réinitialisation n'est plus valide. Demandez-en un nouveau.</p>
            <a href="login.html" style="display:inline-flex;align-items:center;padding:12px 24px;background:var(--grad);border-radius:var(--radius);font-size:14px;font-weight:700;color:#000;text-decoration:none;margin-top:8px">Retour à la connexion →</a>
        </div>

        <!-- Reset form -->
        <div id="resetForm">
            <h1 class="card-title">Nouveau mot de passe</h1>
            <p class="card-sub">Choisissez un nouveau mot de passe sécurisé</p>

            <div class="alert" id="alertEl"></div>

            <div class="form-wrap">
                <div class="form-group">
                    <label class="form-label">Nouveau mot de passe</label>
                    <div class="input-wrap">
                        <input class="form-input" id="newPw" type="password" placeholder="8 caractères minimum" oninput="checkPw(this.value)">
                        <span class="input-icon" onclick="togglePw('newPw',this)">👁️</span>
                    </div>
                    <div class="pw-strength"><div class="pw-bar" id="pb1"></div><div class="pw-bar" id="pb2"></div><div class="pw-bar" id="pb3"></div><div class="pw-bar" id="pb4"></div></div>
                    <span class="field-err" id="err-newPw"></span>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmer</label>
                    <div class="input-wrap">
                        <input class="form-input" id="confirmPw" type="password" placeholder="••••••••">
                        <span class="input-icon" onclick="togglePw('confirmPw',this)">👁️</span>
                    </div>
                    <span class="field-err" id="err-confirm"></span>
                </div>
                <button class="btn-primary" id="submitBtn" onclick="doUpdate()">Changer le mot de passe →</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    const SUPABASE_URL='https://beuujevawwzvlvzhdjch.supabase.co';
    const SUPABASE_KEY='sb_publishable_A2buKvsEM_YsoKp4e09M9w_mKZsxHNw';
    const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

    // Parse token from hash
    const params=new URLSearchParams(window.location.hash.replace('#',''));
    const token=params.get('access_token');
    const type=params.get('type');

    if(!token||type!=='recovery'){
        document.getElementById('resetForm').style.display='none';
        document.getElementById('invalidMsg').style.display='flex';
    }

    async function doUpdate(){
        const pw=document.getElementById('newPw').value;
        const conf=document.getElementById('confirmPw').value;
        document.getElementById('err-newPw').textContent='';
        document.getElementById('err-confirm').textContent='';

        if(pw.length<8){document.getElementById('err-newPw').textContent='8 caractères minimum';return}
        if(pw!==conf){document.getElementById('err-confirm').textContent='Ne correspondent pas';return}

        const btn=document.getElementById('submitBtn');
        btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';

        // Set session with token first
        const{error:sessErr}=await sb.auth.setSession({access_token:token,refresh_token:params.get('refresh_token')||''});
        if(sessErr){
            showAlert('error','❌ Lien expiré. Demandez un nouveau lien.');
            btn.disabled=false;btn.innerHTML='Changer le mot de passe →';
            return;
        }

        const{error}=await sb.auth.updateUser({password:pw});
        if(error){
            showAlert('error','❌ '+error.message);
            btn.disabled=false;btn.innerHTML='Changer le mot de passe →';
        } else {
            showAlert('success','✅ Mot de passe mis à jour ! Redirection...');
            setTimeout(()=>window.location.href='dashboard-client.html',1500);
        }
    }

    function checkPw(pw){
        const bars=['pb1','pb2','pb3','pb4'].map(id=>document.getElementById(id));
        bars.forEach(b=>{b.className='pw-bar'});
        if(!pw) return;
        let s=0;
        if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
        const cls=s<=1?'weak':s<=2?'fair':'strong';
        for(let i=0;i<s;i++) bars[i].classList.add(cls);
    }

    function togglePw(id,icon){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';icon.textContent=i.type==='password'?'👁️':'🙈'}
    function showAlert(type,html){const a=document.getElementById('alertEl');a.className='alert '+type+' show';a.innerHTML=html}
    </script>
</body>
</html>
