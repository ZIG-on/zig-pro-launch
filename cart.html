<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier — ZIG-on</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#D4A017;--gold-lt:#F0C040;--gold-dim:rgba(212,160,23,.12);--bg:#060606;--bg-2:#0D0D0D;--bg-3:#141414;--border:rgba(255,255,255,.06);--border-g:rgba(212,160,23,.22);--text:#F0EDE8;--text-2:#A09890;--text-3:#5A5450;--grad:linear-gradient(135deg,#D4A017 0%,#F0C040 50%,#D4A017 100%);--success:#10B981;--error:#EF4444;--radius:12px}
        html{scroll-behavior:smooth}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none;min-height:100vh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:1}
        .cursor{position:fixed;width:8px;height:8px;background:var(--gold-lt);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference}
        .cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(212,160,23,.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}
        .cursor.active{width:14px;height:14px}.cursor-ring.active{width:48px;height:48px;border-color:var(--gold)}
        header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 5%;background:rgba(6,6,6,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
        .nav-wrap{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:20px 0}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
        .logo-bar{width:4px;height:24px;background:var(--grad);border-radius:2px}
        .nav-links{display:flex;gap:36px;list-style:none}
        .nav-links a{font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-2);text-decoration:none;transition:color .2s}
        .nav-links a:hover{color:var(--text)}
        .nav-actions{display:flex;gap:6px}
        .nav-icon-btn{width:40px;height:40px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none;position:relative}
        .nav-icon-btn:hover{border-color:var(--border-g);color:var(--text)}
        .cart-badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;background:var(--gold);border-radius:9px;font-size:10px;font-weight:700;color:#000;display:none;align-items:center;justify-content:center;padding:0 4px}

        .page-wrap{max-width:1400px;margin:0 auto;padding:110px 5% 100px}
        .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3);margin-bottom:32px}
        .breadcrumb a{color:var(--text-3);text-decoration:none;transition:color .2s}.breadcrumb a:hover{color:var(--text-2)}
        .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,5vw,72px);letter-spacing:2px;line-height:.95;margin-bottom:8px}
        .page-sub{font-size:14px;color:var(--text-2);margin-bottom:48px}
        .page-sub strong{color:var(--gold)}

        .cart-layout{display:grid;grid-template-columns:1fr 360px;gap:40px;align-items:start}

        /* Items */
        .cart-items{border:1px solid var(--border);border-radius:16px;overflow:hidden}
        .cart-item{display:grid;grid-template-columns:88px 1fr auto;gap:20px;align-items:center;padding:22px;border-bottom:1px solid var(--border);background:var(--bg-2);transition:background .2s}
        .cart-item:last-child{border-bottom:none}
        .cart-item:hover{background:var(--bg-3)}
        .item-img{width:88px;height:88px;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
        .item-img img{width:78%;height:78%;object-fit:contain}
        .item-info{min-width:0;display:flex;flex-direction:column;gap:5px}
        .item-cat{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3)}
        .item-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .item-unit{font-size:13px;color:var(--text-2)}
        .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0}
        .item-total{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .qty-row{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:7px;overflow:hidden}
        .qbtn{width:32px;height:32px;background:transparent;border:none;color:var(--text-2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .qbtn:hover{background:var(--bg-3);color:var(--text)}
        .qnum{min-width:30px;text-align:center;font-size:13px;font-weight:700;border-left:1px solid var(--border);border-right:1px solid var(--border);height:32px;display:flex;align-items:center;justify-content:center}
        .remove-btn{background:transparent;border:none;color:var(--text-3);font-size:12px;cursor:pointer;transition:color .2s;padding:2px 0}
        .remove-btn:hover{color:var(--error)}

        /* Empty */
        .empty-cart{padding:80px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
        .empty-icon{font-size:60px;opacity:.2}
        .empty-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:var(--text-2)}
        .empty-sub{font-size:14px;color:var(--text-3);max-width:300px;line-height:1.6}
        .btn-shop{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--grad);border-radius:var(--radius);font-size:14px;font-weight:700;color:#000;text-decoration:none;margin-top:8px;transition:all .25s}
        .btn-shop:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,160,23,.3)}

        /* Summary */
        .cart-summary{background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:26px;position:sticky;top:100px;display:flex;flex-direction:column;gap:18px}
        .sum-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;padding-bottom:14px;border-bottom:1px solid var(--border)}
        .sum-lines{display:flex;flex-direction:column;gap:11px}
        .sum-line{display:flex;justify-content:space-between;font-size:14px}
        .sum-line .lbl{color:var(--text-2)}.sum-line .val{font-weight:600}
        .sum-line.free .val{color:var(--success)}
        .sum-line.disc .val{color:var(--success)}
        .sum-line.total{padding-top:14px;border-top:1px solid var(--border);font-size:15px}
        .sum-line.total .lbl{font-weight:700;color:var(--text)}
        .sum-line.total .val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .promo-wrap{display:flex;gap:8px}
        .promo-input{flex:1;padding:10px 13px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
        .promo-input::placeholder{color:var(--text-3)}.promo-input:focus{border-color:var(--border-g)}
        .promo-input.ok{border-color:rgba(16,185,129,.4)}
        .promo-btn{padding:10px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
        .promo-btn:hover{border-color:var(--border-g);color:var(--text)}
        .promo-msg{font-size:12px;margin-top:-6px}
        .promo-msg.ok{color:var(--success)}.promo-msg.err{color:var(--error)}

        .btn-checkout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:var(--grad);border:none;border-radius:var(--radius);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:all .25s;text-decoration:none;position:relative;overflow:hidden}
        .btn-checkout::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .2s}
        .btn-checkout:hover::after{opacity:1}.btn-checkout:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,160,23,.3)}
        .btn-checkout[disabled]{opacity:.4;pointer-events:none;transform:none;box-shadow:none}
        .btn-continue{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-family:'Outfit',sans-serif;font-size:13px;color:var(--text-2);text-decoration:none;transition:all .25s}
        .btn-continue:hover{border-color:var(--border-g);color:var(--text)}

        .mini-gs{display:flex;flex-direction:column;gap:7px;padding-top:4px;border-top:1px solid var(--border)}
        .mini-g{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text-3)}

        .toast-container{position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:8px}
        .toast{padding:13px 18px;background:var(--bg-3);border:1px solid var(--border-g);border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:240px}
        @keyframes toastIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

        @media(max-width:900px){.cart-layout{grid-template-columns:1fr}.cart-summary{position:static}}
        @media(max-width:768px){body{cursor:auto}.cursor,.cursor-ring{display:none}.nav-links{display:none}.cart-item{grid-template-columns:72px 1fr;gap:12px}.item-right{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center}}
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <header>
        <div class="nav-wrap">
            <a href="index.html" class="logo"><div class="logo-bar"></div>ZIG</a>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="shop.html">Boutique</a></li>
                <li><a href="about.html">À propos</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="nav-icon-btn">👤</a>
                <a href="cart.html" class="nav-icon-btn">🛒<span class="cart-badge" id="cartBadge"></span></a>
            </div>
        </div>
    </header>

    <div class="page-wrap">
        <div class="breadcrumb">
            <a href="index.html">Accueil</a><span>›</span>
            <a href="shop.html">Boutique</a><span>›</span>
            <span>Panier</span>
        </div>
        <h1 class="page-title">Mon panier</h1>
        <p class="page-sub" id="pageSub">Chargement...</p>

        <div class="cart-layout">
            <div id="itemsWrap"></div>

            <div class="cart-summary">
                <div class="sum-title">Récapitulatif</div>
                <div class="sum-lines">
                    <div class="sum-line"><span class="lbl">Sous-total</span><span class="val" id="subtotalEl">—</span></div>
                    <div class="sum-line free"><span class="lbl">Livraison</span><span class="val" id="shippingEl">—</span></div>
                    <div class="sum-line disc" id="discLine" style="display:none"><span class="lbl">Code promo</span><span class="val" id="discEl">—</span></div>
                    <div class="sum-line total"><span class="lbl">Total TTC</span><span class="val" id="totalEl">—</span></div>
                </div>
                <div>
                    <div class="promo-wrap">
                        <input type="text" class="promo-input" id="promoInput" placeholder="Code promo" oninput="this.value=this.value.toUpperCase()">
                        <button class="promo-btn" onclick="applyPromo()">OK</button>
                    </div>
                    <div class="promo-msg" id="promoMsg"></div>
                </div>
                <a href="checkout.html" class="btn-checkout" id="checkoutBtn">Passer la commande →</a>
                <a href="shop.html" class="btn-continue">← Continuer mes achats</a>
                <div class="mini-gs">
                    <div class="mini-g">🔒 Paiement 100% sécurisé</div>
                    <div class="mini-g">🚚 Livraison offerte dès 99€</div>
                    <div class="mini-g">↩️ Retours gratuits 14 jours</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
    const PROMOS={ZIG10:{type:'percent',value:10,label:'-10%'},ZIG20:{type:'percent',value:20,label:'-20%'},LAUNCH:{type:'fixed',value:15,label:'-15€'}};
    let cart=[],promo=null;

    const curEl=document.getElementById('cursor'),ringEl=document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
    (function a(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;curEl.style.left=mx+'px';curEl.style.top=my+'px';ringEl.style.left=rx+'px';ringEl.style.top=ry+'px';requestAnimationFrame(a)})();

    function init(){
        try{cart=JSON.parse(localStorage.getItem('zig_cart')||'[]')}catch(e){cart=[]}
        render();
    }

    function save(){localStorage.setItem('zig_cart',JSON.stringify(cart));badge()}

    function badge(){
        const n=cart.reduce((s,i)=>s+(i.quantity||1),0);
        const el=document.getElementById('cartBadge');
        if(el){el.textContent=n||'';el.style.display=n?'flex':'none'}
    }

    function render(){
        const n=cart.reduce((s,i)=>s+(i.quantity||1),0);
        document.getElementById('pageSub').innerHTML=n?`<strong>${n}</strong> article${n>1?'s':''} dans votre panier`:'Votre panier est vide';
        const wrap=document.getElementById('itemsWrap');
        const btn=document.getElementById('checkoutBtn');

        if(!cart.length){
            wrap.innerHTML=`<div class="cart-items"><div class="empty-cart">
                <div class="empty-icon">🛒</div>
                <div class="empty-title">Panier vide</div>
                <div class="empty-sub">Ajoutez des produits depuis notre boutique pour commencer.</div>
                <a href="shop.html" class="btn-shop">Découvrir la boutique →</a>
            </div></div>`;
            btn.setAttribute('disabled','true');
            updateSummary();badge();return;
        }

        btn.removeAttribute('disabled');
        wrap.innerHTML='<div class="cart-items">'+cart.map((item,i)=>`
            <div class="cart-item">
                <div class="item-img">${item.image?`<img src="${item.image}" alt="" onerror="this.style.display='none'">`:'<span style="font-size:32px;opacity:.15">🖱️</span>'}</div>
                <div class="item-info">
                    <span class="item-cat">Gaming Mouse</span>
                    <div class="item-name">${item.name}</div>
                    <div class="item-unit">${(item.price||0).toFixed(2)}€ / unité</div>
                </div>
                <div class="item-right">
                    <div class="item-total">${((item.price||0)*(item.quantity||1)).toFixed(2)}€</div>
                    <div class="qty-row">
                        <button class="qbtn" onclick="chQty(${i},-1)">−</button>
                        <div class="qnum">${item.quantity||1}</div>
                        <button class="qbtn" onclick="chQty(${i},1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="remove(${i})">✕ Retirer</button>
                </div>
            </div>`).join('')+'</div>';
        updateSummary();badge();
    }

    function chQty(i,d){cart[i].quantity=Math.max(1,(cart[i].quantity||1)+d);save();render()}
    function remove(i){const name=cart[i].name;cart.splice(i,1);save();render();toast('🗑️ <strong>'+name+'</strong> retiré')}

    function updateSummary(){
        const sub=cart.reduce((s,i)=>s+((i.price||0)*(i.quantity||1)),0);
        const ship=sub>=99||sub===0?0:5.99;
        let disc=0;
        if(promo){disc=promo.type==='percent'?sub*promo.value/100:Math.min(promo.value,sub)}
        const total=Math.max(0,sub+ship-disc);
        document.getElementById('subtotalEl').textContent=sub.toFixed(2)+'€';
        document.getElementById('shippingEl').textContent=ship===0?(sub===0?'—':'Gratuit'):ship.toFixed(2)+'€';
        document.getElementById('totalEl').textContent=total.toFixed(2)+'€';
        const dl=document.getElementById('discLine');
        if(promo&&disc>0){dl.style.display='flex';document.getElementById('discEl').textContent='-'+disc.toFixed(2)+'€'}
        else dl.style.display='none';
    }

    function applyPromo(){
        const code=document.getElementById('promoInput').value.trim().toUpperCase();
        const msg=document.getElementById('promoMsg');
        const inp=document.getElementById('promoInput');
        if(!code){msg.className='promo-msg err';msg.textContent='Entrez un code.';return}
        const p=PROMOS[code];
        if(!p){msg.className='promo-msg err';msg.textContent='Code invalide.';inp.classList.remove('ok');promo=null}
        else{promo=p;msg.className='promo-msg ok';msg.textContent='✓ Code "'+code+'" appliqué ('+p.label+')';inp.classList.add('ok');toast('🎉 Code <strong>'+code+'</strong> appliqué !')}
        updateSummary();
    }

    function toast(html){
        const t=document.createElement('div');t.className='toast';t.innerHTML=html;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(()=>{t.style.cssText+='opacity:0;transform:translateX(80px);transition:.3s;';setTimeout(()=>t.remove(),300)},3000);
    }

    init();
    </script>
</body>
</html>
